version: '3.8'

services:
  neo4j:
    image: neo4j:5.16.0
    container_name: colligendis-neo4j
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - neo4j-conf:/conf
    networks:
      - colligendis-network
    healthcheck:
      test: [ "CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: colligendis-app
    ports:
      - "8443:8443"
    environment:
      - SPRING_NEO4J_URI=bolt://neo4j:7687
      - SPRING_NEO4J_AUTHENTICATION_USERNAME=neo4j
      - SPRING_NEO4J_AUTHENTICATION_PASSWORD=password
      - SERVER_SSL_ENABLED=true
    volumes:
      - ./logs:/app/logs
      - app-data:/app/data
    networks:
      - colligendis-network
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--no-check-certificate", "https://localhost:8443/api/auth/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

networks:
  colligendis-network:
    driver: bridge

volumes:
  neo4j-data:
  neo4j-logs:
  neo4j-conf:
  app-data:
